; Intercom ESP32 - Полнодуплексный интерком на ESP32
; Аппаратное обеспечение: ESP32, MAX98357A, I2S микрофон SPH0645LM4H-B

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = direct

; Файловая система для веб-интерфейса
board_build.filesystem = littlefs

; Зависимости
lib_deps =
    bblanchon/ArduinoJson@^7.0.0

; Опции компилятора
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0

; Разделение памяти (для достаточно места под код и данные)
board_build.partitions = partitions.csv

; Размер стека для задачи setup()
; extra_scripts = custom_script.py
