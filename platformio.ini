; =====================================================
; Intercom ESP32 v2.0 — Режим рации (Walkie-Talkie)
; =====================================================
; Два окружения для двух плат:
;   esp32dev   — ESP32 DevKit + WiFi (дом)
;   wt32-eth01 — WT32-ETH01 v1.4 + Ethernet (гараж)
;
; Микрофон: ICS-43434 (24-бит I2S MEMS)
; Динамик: MAX98357A (I2S Class D усилитель)
; =====================================================

; ==================== ESP32 DevKit (WiFi) ====================
[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = direct
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DUSE_WIFI=1

; Upload settings (for CH9102 USB-serial)
upload_port = COM5
upload_speed = 460800
upload_protocol = esptool

; ==================== WT32-ETH01 v1.4 (Ethernet) ====================
[env:wt32-eth01]
platform = espressif32@6.5.0
board = wt32-eth01
framework = arduino
monitor_speed = 115200
monitor_filters = direct
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DUSE_ETHERNET=1

; Upload settings
upload_speed = 460800
upload_protocol = esptool
